# Copy to config.yaml in this directory (gitignored).
#
# Single-agent schema — tokens in router/.env
project:
  name: "my-project"
  platform: "github"        # "github" or "azure_devops"

slack:
  channels:
    - "#engineering-bots"

agent:
  name: "engineer"          # matches .claude/agents/<name>.md
  backend: "claude"         # "claude" or "cursor"
  model: "claude-sonnet-4-6"
  timeout_minutes: 60
  # follow_thread: true     # opt-in: deliver follow-up thread messages to the running agent
                            # (needs the inbox hooks in .claude/settings.json + .orcai/hooks/)


